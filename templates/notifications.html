{% extends "base.html" %}
{% block content %}

<div style="display: flex; justify-content: space-between; align-items: center;">
    <h1>Notifications for {{ user.username }}</h1>
    <a href="/view/users/{{ user.id }}">← Back to profile</a>
</div>

<table>
    <thead>
        <tr>
            <th>From</th>
            <th>Message</th>
            <th>Date</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for n in notifications %}
        <tr>
            <td>{{ n.triggered_by_username }}</td>
            <td>{{ n.message }}</td>
            <td>{{ n.created_at }}</td>
            <td>
                <form class="inline" action="/view/notifications/{{ n.id }}/delete" method="POST">
                    <input type="hidden" name="user_id" value="{{ user.id }}">
                    <button class="btn btn-danger btn-small" type="submit">Dismiss</button>
                </form>
            </td>
        </tr>
        {% else %}
        <tr><td colspan="4" style="color:#999;">No notifications.</td></tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
